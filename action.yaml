name: glint
description: GitOps linter — auto-render Helm/Kustomize and validate with CEL policies
author: lukashankeln
inputs:
  config:
    description: Path to glint.yaml config file
    required: false
    default: glint.yaml
  format:
    description: 'Output format: text | json | sarif | junit | github-actions'
    required: false
    default: github-actions
  fail-on:
    description: Comma-separated severities that cause the step to fail
    required: false
    default: error
  sarif-file:
    description: Path to write SARIF output (leave empty to skip)
    required: false
    default: glint-results.sarif
  paths:
    description: 'Space-separated paths to lint (default: .)'
    required: false
    default: .
runs:
  using: docker
  image: docker://ghcr.io/lukashankeln/glint:v0.1.14
  args:
    - lint
    - ${{ inputs.paths }}
    - --config
    - ${{ inputs.config }}
    - --format
    - ${{ inputs.format }}
    - --fail-on
    - ${{ inputs.fail-on }}
    - --output-sarif
    - ${{ inputs.sarif-file }}
