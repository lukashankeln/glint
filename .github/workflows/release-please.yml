name: Release

on:
  push:
    branches: [main]

jobs:
  release-please:
    permissions:
      contents: write
      pull-requests: write
    uses: kube-the-home/github-actions/.github/workflows/release-please.yaml@6a42c4b92ae30747603d0846aad29a463f0ea11e # v1.4.3
    with:
      config_file: release-please-config.json
      manifest_file: .release-please-manifest.json
    secrets:
      APP_ID: ${{ secrets.RELEASE_APP_ID }}
      APP_PRIVATE_KEY: ${{ secrets.RELEASE_APP_PEM }}
