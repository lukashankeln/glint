name: Release

on:
  push:
    branches: [main]

jobs:
  release-please:
    permissions:
      contents: write
      pull-requests: write
    uses: kube-the-home/github-actions/.github/workflows/release-please.yaml@9a4771645c64b73a0f4c5409e3c3b714932590f2 # v1.4.8
    with:
      config_file: release-please-config.json
      manifest_file: .release-please-manifest.json
    secrets:
      APP_ID: ${{ secrets.RELEASE_APP_ID }}
      APP_PRIVATE_KEY: ${{ secrets.RELEASE_APP_PEM }}
