name: Docker

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

jobs:
  build:
    uses: kube-the-home/github-actions/.github/workflows/docker-build.yaml@a742a2eda2b622e6902ee5e97db2fcd1d6c432a9 # v1.4.7
    with:
      image: ghcr.io/lukashankeln/glint
      tag: ${{ github.ref_name }}
    secrets:
      registry_password: ${{ secrets.GITHUB_TOKEN }}
