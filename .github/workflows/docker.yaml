name: Docker

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

jobs:
  build:
    uses: kube-the-home/github-actions/.github/workflows/docker-build.yaml@e698429ae3d6096c14d7eb6d2ffef1da8c26cdea # v1.4.1
    with:
      image: ghcr.io/lukashankeln/glint
      tag: ${{ github.ref_name }}
    secrets:
      registry_password: ${{ secrets.GITHUB_TOKEN }}
